<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex-shrink-0">
                <span class="text-xl font-bold text-blue-600 tracking-wide">AplikasiKu</span>
            </div>
            <div>
                <a th:href="@{/logout}"
                   class="bg-red-50 hover:bg-red-100 text-red-600 font-medium px-4 py-2 rounded-lg text-sm transition duration-150 border border-red-200">
                    Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-4xl w-full mx-auto p-4 sm:p-6 lg:p-8 mt-6">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sm:p-8">
        <div class="flex items-center space-x-4 border-b border-gray-100 pb-6 mb-6">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl font-bold uppercase">
                <span th:text="${#strings.substring(profile.nama,0,1)}">U</span>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Selamat Datang Kembali!</h1>
                <p class="text-gray-500 text-sm">Berikut adalah detail profil akun Anda.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                <span class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Username</span>
                <span class="text-lg font-medium text-gray-800" th:text="${user.username}">-</span>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                <span class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Nama Lengkap</span>
                <span class="text-lg font-medium text-gray-800" th:text="${profile.nama}">-</span>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                <span class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Alamat</span>
                <span class="text-lg font-medium text-gray-800" th:text="${profile.alamat}">-</span>
            </div>
        </div>
    </div>
</main>

</body>
</html>
