<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Aplikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-10">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Buat Akun</h1>
        <p class="text-gray-500 mt-2">Lengkapi data diri Anda di bawah ini</p>
    </div>

    <form th:action="@{/register}" method="post" th:object="${request}" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Username</label>
            <input type="text"
                   th:field="*{username}"
                   placeholder="Pilih username"
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
            <input type="password"
                   th:field="*{password}"
                   placeholder="••••••••"
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Nama Lengkap</label>
            <input type="text"
                   th:field="*{nama}"
                   placeholder="Nama lengkap Anda"
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Alamat</label>
            <input type="text"
                   th:field="*{alamat}"
                   placeholder="Kota asal / Domisili"
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-lg shadow-blue-500/20 mt-2">
            Daftar
        </button>
    </form>

    <div class="mt-6 text-center border-t border-gray-100 pt-4">
        <p class="text-sm text-gray-600">Sudah punya akun?</p>
        <a th:href="@{/login}" class="text-sm text-blue-600 hover:text-blue-800 font-semibold inline-block mt-1 hover:underline">
            Masuk di sini
        </a>
    </div>
</div>

</body>
</html>
